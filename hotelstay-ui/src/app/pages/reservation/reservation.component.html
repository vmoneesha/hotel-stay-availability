@if (selectedRoom(); as selected) {
  <section class="reservation-page">
    <app-booking-progress [currentStep]="2" />

    <div class="reservation-layout">
      <aside class="summary-rail" aria-label="Booking summary">
        <app-booking-summary-card [selected]="selected" />
      </aside>

      <section class="form-panel">
        <div class="form-heading">
          <p class="eyebrow">Your details</p>
          <h1>Finish your reservation</h1>
          <p>Enter the traveller details exactly as they appear on the selected identity document.</p>
        </div>

        <app-reservation-form
          [selected]="selected"
          [loading]="loading()"
          [serverErrors]="validationErrors()"
          (reserve)="reserve($event)" />
      </section>
    </div>
  </section>
} @else {
  <section class="missing-selection">
    <h1>No room selected</h1>
    <p>Choose an available room before starting a reservation.</p>
    <a routerLink="/search" class="secondary-button">Back to search</a>
  </section>
}
